title: SASO Dev Log
description: Build-in-public notes from a solo maker — games, agents, and AI tooling.
url: "https://chpark03.github.io"
baseurl: ""
author: CHPARK03
lang: ko
timezone: Asia/Seoul
logo: /assets/img/saso-logo.jpg

plugins:
  - jekyll-feed
  - jekyll-seo-tag

collections:
  projects:
    output: true
    permalink: /projects/:name/

defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: project
  - scope:
      path: ""
    values:
      image: /assets/img/saso-logo.jpg

permalink: /:year/:month/:day/:title/

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
